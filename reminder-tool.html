<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>靈感提醒</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --card: #1e1e23;
    --border: #2e2e38;
    --accent: #f5c842;
    --accent2: #e8855a;
    --text: #e8e8ec;
    --muted: #6b6b7a;
    --danger: #e05252;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Serif TC', serif; min-height: 100vh; display: flex; flex-direction: column; }

  /* Login */
  #login-screen { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; }
  #login-screen h1 { font-size:2rem; color:var(--accent); }
  #login-screen p { color:var(--muted); font-size:0.9rem; text-align:center; line-height:2; }
  #google-login-btn { display:flex; align-items:center; gap:12px; background:#fff; color:#333; border:none; border-radius:8px; padding:13px 24px; font-size:1rem; font-weight:600; cursor:pointer; font-family:'Noto Serif TC',serif; transition:opacity 0.2s; }
  #google-login-btn:hover { opacity:0.9; }
  #login-error { color:#e05252; font-size:0.82rem; display:none; }

  /* App */
  #app { display:none; flex-direction:column; flex:1; }
  header { padding:16px 28px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
  header h1 { font-size:1.3rem; font-weight:700; color:var(--accent); }
  #clock { font-family:'JetBrains Mono',monospace; font-size:0.88rem; color:var(--muted); }
  #user-info { margin-left:auto; display:flex; align-items:center; gap:8px; }
  #user-avatar { width:28px; height:28px; border-radius:50%; border:2px solid var(--border); }
  #user-name { font-size:0.78rem; color:var(--muted); }
  #logout-btn { font-size:0.72rem; padding:4px 9px; border:1px solid var(--border); background:transparent; color:var(--muted); border-radius:4px; cursor:pointer; font-family:'Noto Serif TC',serif; transition:all 0.2s; }
  #logout-btn:hover { border-color:var(--danger); color:var(--danger); }

  main { display:grid; grid-template-columns:360px 1fr; flex:1; overflow:hidden; }

  /* Form */
  .form-panel { border-right:1px solid var(--border); padding:22px; display:flex; flex-direction:column; gap:14px; overflow-y:auto; }
  .panel-title { font-size:0.7rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); }
  label { display:block; font-size:0.78rem; color:var(--muted); margin-bottom:5px; }
  input[type="text"], textarea, input[type="datetime-local"] { width:100%; background:var(--card); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:9px 12px; font-family:'Noto Serif TC',serif; font-size:0.88rem; outline:none; transition:border-color 0.2s; resize:none; }
  input:focus, textarea:focus { border-color:var(--accent); }
  textarea { min-height:100px; line-height:1.7; }
  input[type="datetime-local"]::-webkit-calendar-picker-indicator { filter:invert(0.5); cursor:pointer; }
  .quick-times { display:flex; flex-wrap:wrap; gap:6px; margin-top:7px; }
  .qt { font-size:0.72rem; padding:4px 10px; border:1px solid var(--border); background:transparent; color:var(--muted); border-radius:20px; cursor:pointer; font-family:'Noto Serif TC',serif; transition:all 0.15s; }
  .qt:hover { border-color:var(--accent); color:var(--accent); }
  #add-btn { background:var(--accent); color:#111; border:none; border-radius:6px; padding:11px; font-size:0.92rem; font-weight:700; font-family:'Noto Serif TC',serif; cursor:pointer; transition:opacity 0.2s; margin-top:4px; }
  #add-btn:hover { opacity:0.85; }
  #add-btn:disabled { opacity:0.5; cursor:not-allowed; }

  /* List */
  .list-panel { padding:22px 26px; overflow-y:auto; display:flex; flex-direction:column; gap:12px; }
  .list-header { display:flex; align-items:center; gap:10px; margin-bottom:2px; }
  .list-header h2 { font-size:0.7rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); }
  .count-badge { font-family:'JetBrains Mono',monospace; font-size:0.7rem; background:var(--card); border:1px solid var(--border); color:var(--muted); border-radius:10px; padding:1px 7px; }
  .tabs { display:flex; border:1px solid var(--border); border-radius:6px; overflow:hidden; margin-left:auto; }
  .tab { font-size:0.72rem; padding:4px 12px; background:transparent; border:none; color:var(--muted); cursor:pointer; font-family:'Noto Serif TC',serif; transition:all 0.15s; border-right:1px solid var(--border); }
  .tab:last-child { border-right:none; }
  .tab.active { background:var(--accent); color:#111; font-weight:700; }
  .empty { text-align:center; padding:50px 20px; color:var(--muted); font-size:0.88rem; line-height:2; }

  /* Card */
  .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:15px 17px; }
  .card.firing { border-color:var(--accent); box-shadow:0 0 0 2px rgba(245,200,66,0.2); }
  .card-top { display:flex; align-items:flex-start; gap:10px; margin-bottom:7px; }
  .card-title { font-size:0.95rem; font-weight:600; color:var(--text); flex:1; line-height:1.4; }
  .card-time { font-family:'JetBrains Mono',monospace; font-size:0.7rem; color:var(--muted); white-space:nowrap; margin-top:2px; }
  .card-body { font-size:0.84rem; color:#b0b0be; line-height:1.75; white-space:pre-wrap; border-left:2px solid var(--border); padding-left:10px; margin-bottom:11px; }
  .firing .card-body { border-color:var(--accent); }
  .card-footer { display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
  .status-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .status-dot.pending { background:var(--muted); }
  .status-dot.fired { background:var(--accent); animation:blink 0.9s ease infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  .status-text { font-size:0.72rem; color:var(--muted); flex:1; }
  .countdown { font-family:'JetBrains Mono',monospace; font-size:0.7rem; color:var(--accent2); }

  .btn { border:none; border-radius:5px; padding:5px 13px; font-size:0.76rem; font-weight:700; font-family:'Noto Serif TC',serif; cursor:pointer; transition:opacity 0.2s; }
  .btn-confirm-keep { background:var(--accent); color:#111; }
  .btn-confirm-del { background:transparent; border:1px solid var(--accent); color:var(--accent); }
  .btn-edit { background:transparent; border:1px solid var(--border); color:var(--muted); }
  .btn-delete { background:transparent; border:1px solid var(--border); color:var(--muted); }
  .btn:hover { opacity:0.8; }
  .btn-delete:hover { border-color:var(--danger); color:var(--danger); }

  /* Edit modal */
  #modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; z-index:100; }
  #modal-overlay.show { display:flex; }
  #modal { background:#1e1e23; border:1px solid var(--border); border-radius:12px; padding:24px; width:90%; max-width:400px; display:flex; flex-direction:column; gap:14px; }
  #modal h3 { font-size:1rem; color:var(--accent); }
  #modal-footer { display:flex; gap:8px; justify-content:flex-end; }
  #modal-save { background:var(--accent); color:#111; border:none; border-radius:6px; padding:8px 18px; font-size:0.88rem; font-weight:700; font-family:'Noto Serif TC',serif; cursor:pointer; }
  #modal-cancel { background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:6px; padding:8px 14px; font-size:0.84rem; font-family:'Noto Serif TC',serif; cursor:pointer; }

  #toast { position:fixed; bottom:22px; right:22px; background:var(--accent); color:#111; padding:8px 16px; border-radius:6px; font-size:0.82rem; font-weight:700; opacity:0; transform:translateY(10px); transition:all 0.25s; pointer-events:none; z-index:999; }
  #toast.show { opacity:1; transform:translateY(0); }

  @media(max-width:700px) {
    main { grid-template-columns:1fr; }
    .form-panel { border-right:none; border-bottom:1px solid var(--border); }
  }
</style>
</head>
<body>

<div id="login-screen">
  <div style="font-size:2.5rem">💡</div>
  <h1>靈感提醒</h1>
  <p>用 Google 帳號登入<br>電腦、手機資料即時同步</p>
  <button id="google-login-btn" onclick="loginWithGoogle()">
    <svg viewBox="0 0 48 48" width="22" height="22"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34.2 6.7 29.4 4.5 24 4.5 12.7 4.5 3.5 13.7 3.5 25S12.7 45.5 24 45.5 44.5 36.3 44.5 25c0-1.7-.2-3.3-.9-4.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16 19 12 24 12c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34.2 6.7 29.4 4.5 24 4.5c-7.7 0-14.4 4.4-17.7 10.2z"/><path fill="#4CAF50" d="M24 45.5c5.2 0 10-2 13.6-5.2l-6.3-5.3C29.3 36.8 26.8 37.5 24 37.5c-5.2 0-9.7-3.5-11.3-8.4l-6.5 5C9.5 41.1 16.3 45.5 24 45.5z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.3 5.7l6.3 5.3c-.4.4 6.7-4.9 6.7-14 0-1.7-.2-3.3-.9-4.9z"/></svg>
    使用 Google 登入
  </button>
  <div id="login-error"></div>
</div>

<div id="app">
  <header>
    <span style="font-size:1.3rem">💡</span>
    <h1>靈感提醒</h1>
    <span id="clock"></span>
    <div id="user-info">
      <img id="user-avatar" src="" alt="">
      <span id="user-name"></span>
      <button id="logout-btn" onclick="logout()">登出</button>
    </div>
  </header>
  <main>
    <div class="form-panel">
      <div class="panel-title">新增提醒</div>
      <div>
        <label>標題</label>
        <input type="text" id="inp-title" placeholder="e.g. 美股開盤策略" maxlength="60">
      </div>
      <div>
        <label>詳細內容</label>
        <textarea id="inp-body" placeholder="把你的靈感、策略、注意事項都寫下來…"></textarea>
      </div>
      <div>
        <label>提醒時間</label>
        <input type="datetime-local" id="inp-time">
        <div class="quick-times">
          <button class="qt" onclick="addMinutes(15)">+15分</button>
          <button class="qt" onclick="addMinutes(30)">+30分</button>
          <button class="qt" onclick="addMinutes(60)">+1小時</button>
          <button class="qt" onclick="addMinutes(120)">+2小時</button>
          <button class="qt" onclick="setToday(18,0)">今天18:00</button>
          <button class="qt" onclick="setToday(21,30)">今天21:30</button>
        </div>
      </div>
      <button id="add-btn" onclick="addReminder()">＋ 記錄靈感</button>
    </div>
    <div class="list-panel">
      <div class="list-header">
        <h2>所有提醒</h2>
        <span class="count-badge" id="count-badge">0</span>
        <div class="tabs">
          <button class="tab active" onclick="setFilter('all',this)">全部</button>
          <button class="tab" onclick="setFilter('pending',this)">待提醒</button>
          <button class="tab" onclick="setFilter('fired',this)">已觸發</button>
        </div>
      </div>
      <div id="list"><div style="text-align:center;padding:40px;color:var(--muted)">載入中…</div></div>
    </div>
  </main>
</div>

<!-- Edit Modal -->
<div id="modal-overlay">
  <div id="modal">
    <h3>✏️ 編輯提醒</h3>
    <div>
      <label>標題</label>
      <input type="text" id="modal-title" maxlength="60">
    </div>
    <div>
      <label>詳細內容</label>
      <textarea id="modal-body" style="min-height:80px"></textarea>
    </div>
    <div>
      <label>下次提醒時間</label>
      <input type="datetime-local" id="modal-time">
      <div class="quick-times">
        <button class="qt" onclick="modalAddMinutes(30)">+30分</button>
        <button class="qt" onclick="modalAddMinutes(60)">+1小時</button>
        <button class="qt" onclick="modalAddMinutes(120)">+2小時</button>
        <button class="qt" onclick="modalSetToday(18,0)">今天18:00</button>
        <button class="qt" onclick="modalSetToday(21,30)">今天21:30</button>
      </div>
    </div>
    <div id="modal-footer">
      <button id="modal-cancel" onclick="closeModal()">取消</button>
      <button id="modal-save" onclick="saveEdit()">儲存</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, updateDoc, query, where, orderBy }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAlD1wVuKpnk9N3KxxOxQvdr7KFRDOchuk",
  authDomain: "reminder-6b75a.firebaseapp.com",
  projectId: "reminder-6b75a",
  storageBucket: "reminder-6b75a.firebasestorage.app",
  messagingSenderId: "150115495510",
  appId: "1:150115495510:web:ecd647b858a97aef73d5f7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let currentUser = null;
let reminders = [];
let filter = 'all';
let unsubscribe = null;
let editingId = null;
let countdownTimer = null;

// ── Auth ──────────────────────────────────────────────
window.loginWithGoogle = async () => {
  try {
    await signInWithRedirect(auth, provider);
  } catch(e) {
    const el = document.getElementById('login-error');
    el.style.display = 'block';
    el.textContent = '登入失敗：' + e.message;
  }
};

// Handle redirect result
getRedirectResult(auth).catch(e => {
  if (e.code !== 'auth/null-user') {
    const el = document.getElementById('login-error');
    el.style.display = 'block';
    el.textContent = '登入失敗：' + e.message;
  }
});

window.logout = async () => {
  if (unsubscribe) unsubscribe();
  if (countdownTimer) clearInterval(countdownTimer);
  await signOut(auth);
};

onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('user-avatar').src = user.photoURL || '';
    document.getElementById('user-name').textContent = user.displayName || user.email;
    subscribeReminders();
    startCountdownTimer();
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    reminders = [];
  }
});

// ── Firestore ─────────────────────────────────────────
function subscribeReminders() {
  if (unsubscribe) unsubscribe();
  const q = query(
    collection(db, 'reminders'),
    where('uid', '==', currentUser.uid),
    orderBy('time', 'asc')
  );
  unsubscribe = onSnapshot(q, snap => {
    reminders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    checkFired();
    render();
  });
}

async function checkFired() {
  const now = Date.now();
  for (const r of reminders) {
    if (!r.fired && r.time <= now) {
      await updateDoc(doc(db, 'reminders', r.id), { fired: true });
      toast(`🔔 提醒：${r.title}`);
    }
  }
}

window.addReminder = async () => {
  const title = document.getElementById('inp-title').value.trim();
  const body  = document.getElementById('inp-body').value.trim();
  const tval  = document.getElementById('inp-time').value;
  if (!title) { toast('請輸入標題'); return; }
  if (!tval)  { toast('請選擇提醒時間'); return; }
  const btn = document.getElementById('add-btn');
  btn.disabled = true; btn.textContent = '儲存中…';
  try {
    await addDoc(collection(db, 'reminders'), {
      uid: currentUser.uid, title, body,
      time: new Date(tval).getTime(), fired: false, createdAt: Date.now()
    });
    toast('✅ 靈感已記錄！');
    document.getElementById('inp-title').value = '';
    document.getElementById('inp-body').value = '';
    document.getElementById('inp-time').value = '';
  } catch(e) { toast('儲存失敗：' + e.message); }
  btn.disabled = false; btn.textContent = '＋ 記錄靈感';
};

// confirm = keep (just mark acknowledged, stay in fired)
window.confirmReminder = async (id) => {
  // Just toast, data stays; user can edit or delete from 已觸發
  toast('✅ 已確認！可在「已觸發」中管理');
};

window.confirmAndDelete = async (id) => {
  await deleteDoc(doc(db, 'reminders', id));
  toast('🗑 提醒已確認並刪除');
};

window.deleteReminder = async (id) => {
  await deleteDoc(doc(db, 'reminders', id));
  toast('已刪除');
};

// ── Edit Modal ────────────────────────────────────────
window.openEdit = (id) => {
  const r = reminders.find(x => x.id === id);
  if (!r) return;
  editingId = id;
  document.getElementById('modal-title').value = r.title;
  document.getElementById('modal-body').value = r.body || '';
  document.getElementById('modal-time').value = toLocalISO(new Date(r.time));
  document.getElementById('modal-overlay').classList.add('show');
};

window.closeModal = () => {
  document.getElementById('modal-overlay').classList.remove('show');
  editingId = null;
};

window.saveEdit = async () => {
  if (!editingId) return;
  const title = document.getElementById('modal-title').value.trim();
  const body  = document.getElementById('modal-body').value.trim();
  const tval  = document.getElementById('modal-time').value;
  if (!title) { toast('請輸入標題'); return; }
  if (!tval)  { toast('請選擇時間'); return; }
  const newTime = new Date(tval).getTime();
  await updateDoc(doc(db, 'reminders', editingId), {
    title, body, time: newTime, fired: newTime <= Date.now() ? true : false
  });
  closeModal();
  toast('✅ 已更新！');
};

// Modal quick time helpers
window.modalAddMinutes = m => { document.getElementById('modal-time').value = toLocalISO(new Date(Date.now() + m*60000)); };
window.modalSetToday = (h,min) => { const d = new Date(); d.setHours(h,min,0,0); document.getElementById('modal-time').value = toLocalISO(d); };

// ── Filter ────────────────────────────────────────────
window.setFilter = (f, el) => {
  filter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
};

// ── Countdown timer (only updates countdown text, no full re-render) ──
function startCountdownTimer() {
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    checkFired();
    // Only update countdown spans, not whole list
    document.querySelectorAll('.countdown-span').forEach(el => {
      const ts = parseInt(el.dataset.ts);
      const txt = getCountdown(ts);
      el.textContent = txt || '';
    });
  }, 1000);
}

// ── Render ────────────────────────────────────────────
function render() {
  const list = document.getElementById('list');
  let visible = reminders.filter(r => {
    if (filter === 'pending') return !r.fired;
    if (filter === 'fired')   return r.fired;
    return true;
  });
  document.getElementById('count-badge').textContent = reminders.length;

  if (visible.length === 0) {
    list.innerHTML = `<div class="empty">📭 還沒有提醒<br><span style="font-size:0.82rem">在左側新增你的第一個靈感</span></div>`;
    return;
  }

  list.innerHTML = visible.map(r => {
    const d = new Date(r.time);
    const timeStr = d.toLocaleString('zh-TW', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit', hour12:false });
    const countdown = getCountdown(r.time);

    const firedButtons = `
      <button class="btn btn-confirm-keep" onclick="confirmReminder('${r.id}')">✓ 確認</button>
      <button class="btn btn-confirm-del" onclick="confirmAndDelete('${r.id}')">確認並刪除</button>`;

    const pendingButtons = `
      ${countdown ? `<span class="countdown countdown-span" data-ts="${r.time}">${countdown}</span>` : ''}
      <button class="btn btn-delete" onclick="deleteReminder('${r.id}')">刪除</button>`;

    const firedMgmtButtons = `
      <button class="btn btn-edit" onclick="openEdit('${r.id}')">✏️ 編輯/重設時間</button>
      <button class="btn btn-delete" onclick="deleteReminder('${r.id}')">刪除</button>`;

    let footer = '';
    if (r.fired && filter !== 'fired') {
      footer = firedButtons;
    } else if (r.fired && filter === 'fired') {
      footer = firedMgmtButtons;
    } else {
      footer = pendingButtons;
    }

    return `
    <div class="card ${r.fired ? 'firing' : ''}" id="card-${r.id}">
      <div class="card-top">
        <div class="card-title">${esc(r.title)}</div>
        <div class="card-time">${timeStr}</div>
      </div>
      ${r.body ? `<div class="card-body">${esc(r.body)}</div>` : ''}
      <div class="card-footer">
        <div class="status-dot ${r.fired ? 'fired' : 'pending'}"></div>
        <span class="status-text">${r.fired ? '🔔 時間到了！' : '等待提醒中'}</span>
        ${footer}
      </div>
    </div>`;
  }).join('');
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function getCountdown(ts) {
  const diff = ts - Date.now();
  if (diff <= 0) return null;
  const h = Math.floor(diff/3600000);
  const m = Math.floor((diff%3600000)/60000);
  const s = Math.floor((diff%60000)/1000);
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

// ── Clock ─────────────────────────────────────────────
setInterval(() => {
  const el = document.getElementById('clock');
  if (el) el.textContent = new Date().toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
}, 1000);

// ── Quick time ────────────────────────────────────────
function toLocalISO(d) {
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
window.toLocalISO = toLocalISO;
window.addMinutes = m => { document.getElementById('inp-time').value = toLocalISO(new Date(Date.now() + m*60000)); };
window.setToday = (h,min) => { const d = new Date(); d.setHours(h,min,0,0); document.getElementById('inp-time').value = toLocalISO(d); };

// ── Toast ─────────────────────────────────────────────
let toastTimer;
window.toast = msg => {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
};
</script>
