<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>靈感提醒</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --surface: #17171a;
    --card: #1e1e23;
    --border: #2e2e38;
    --accent: #f5c842;
    --accent2: #e8855a;
    --text: #e8e8ec;
    --muted: #6b6b7a;
    --danger: #e05252;
    --success: #52c97a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Serif TC', serif; min-height: 100vh; display: flex; flex-direction: column; }

  /* Login screen */
  #login-screen {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
  }
  #login-screen h1 { font-size: 2rem; color: var(--accent); }
  #login-screen p { color: var(--muted); font-size: 0.9rem; text-align: center; line-height: 2; }
  #google-login-btn {
    display: flex; align-items: center; gap: 12px;
    background: #fff; color: #333; border: none; border-radius: 8px;
    padding: 13px 24px; font-size: 1rem; font-weight: 600; cursor: pointer;
    font-family: 'Noto Serif TC', serif; transition: opacity 0.2s;
  }
  #google-login-btn:hover { opacity: 0.9; }
  #google-login-btn svg { width: 22px; height: 22px; }

  /* App */
  #app { display: none; flex-direction: column; flex: 1; }
  header {
    padding: 20px 32px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
  }
  header h1 { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
  #clock { font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; color: var(--muted); }
  #user-info { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  #user-avatar { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--border); }
  #user-name { font-size: 0.8rem; color: var(--muted); }
  #logout-btn {
    font-size: 0.75rem; padding: 4px 10px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); border-radius: 4px; cursor: pointer;
    font-family: 'Noto Serif TC', serif; transition: all 0.2s;
  }
  #logout-btn:hover { border-color: var(--danger); color: var(--danger); }
  #notif-btn {
    font-size: 0.75rem; padding: 4px 10px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); border-radius: 4px; cursor: pointer;
    font-family: 'Noto Serif TC', serif; transition: all 0.2s;
  }
  #notif-btn:hover { border-color: var(--accent); color: var(--accent); }

  main { display: grid; grid-template-columns: 370px 1fr; flex: 1; overflow: hidden; }

  .form-panel {
    border-right: 1px solid var(--border); padding: 24px;
    display: flex; flex-direction: column; gap: 16px; overflow-y: auto;
  }
  .panel-title { font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
  label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 5px; }
  input[type="text"], textarea, input[type="datetime-local"] {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 9px 12px;
    font-family: 'Noto Serif TC', serif; font-size: 0.9rem; outline: none;
    transition: border-color 0.2s; resize: none;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  textarea { min-height: 110px; line-height: 1.7; }
  input[type="datetime-local"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }
  .quick-times { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .qt {
    font-size: 0.74rem; padding: 4px 10px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); border-radius: 20px; cursor: pointer;
    font-family: 'Noto Serif TC', serif; transition: all 0.15s;
  }
  .qt:hover { border-color: var(--accent); color: var(--accent); }
  #add-btn {
    background: var(--accent); color: #111; border: none; border-radius: 6px;
    padding: 11px; font-size: 0.95rem; font-weight: 700; font-family: 'Noto Serif TC', serif;
    cursor: pointer; transition: opacity 0.2s; margin-top: 4px;
  }
  #add-btn:hover { opacity: 0.85; }
  #add-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .list-panel { padding: 24px 28px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
  .list-header { display: flex; align-items: center; gap: 10px; margin-bottom: 2px; }
  .list-header h2 { font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
  .count-badge {
    font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 1px 7px;
  }
  .tabs { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; margin-left: auto; }
  .tab {
    font-size: 0.74rem; padding: 4px 12px; background: transparent; border: none;
    color: var(--muted); cursor: pointer; font-family: 'Noto Serif TC', serif;
    transition: all 0.15s; border-right: 1px solid var(--border);
  }
  .tab:last-child { border-right: none; }
  .tab.active { background: var(--accent); color: #111; font-weight: 700; }

  .empty { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 0.88rem; line-height: 2; }

  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 18px; transition: border-color 0.3s, box-shadow 0.3s;
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  .card.firing {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(245,200,66,0.25), 0 0 20px rgba(245,200,66,0.12);
    animation: pulse 1.4s ease infinite;
  }
  @keyframes pulse {
    0%,100%{ box-shadow: 0 0 0 2px rgba(245,200,66,0.25), 0 0 20px rgba(245,200,66,0.12); }
    50%{ box-shadow: 0 0 0 3px rgba(245,200,66,0.45), 0 0 32px rgba(245,200,66,0.22); }
  }
  .card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .card-title { font-size: 0.98rem; font-weight: 600; color: var(--text); flex: 1; line-height: 1.4; }
  .card-time { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); white-space: nowrap; margin-top: 2px; }
  .card-body {
    font-size: 0.86rem; color: #b0b0be; line-height: 1.75; white-space: pre-wrap;
    border-left: 2px solid var(--border); padding-left: 11px; margin-bottom: 12px;
  }
  .firing .card-body { border-color: var(--accent); }
  .card-footer { display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.pending { background: var(--muted); }
  .status-dot.fired { background: var(--accent); animation: blink 0.9s ease infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  .status-text { font-size: 0.74rem; color: var(--muted); flex: 1; }
  .btn-confirm {
    background: var(--accent); color: #111; border: none; border-radius: 5px;
    padding: 5px 14px; font-size: 0.78rem; font-weight: 700;
    font-family: 'Noto Serif TC', serif; cursor: pointer; transition: opacity 0.2s;
  }
  .btn-confirm:hover { opacity: 0.85; }
  .btn-delete {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    border-radius: 5px; padding: 4px 10px; font-size: 0.76rem;
    font-family: 'Noto Serif TC', serif; cursor: pointer; transition: all 0.15s;
  }
  .btn-delete:hover { border-color: var(--danger); color: var(--danger); }
  .countdown { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--accent2); margin-left: auto; }

  #toast {
    position: fixed; bottom: 24px; right: 24px; background: var(--accent); color: #111;
    padding: 9px 18px; border-radius: 6px; font-size: 0.83rem; font-weight: 700;
    opacity: 0; transform: translateY(10px); transition: all 0.25s;
    pointer-events: none; z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  .loading { flex:1; display:flex; align-items:center; justify-content:center; color: var(--muted); }

  @media(max-width:700px) {
    main { grid-template-columns: 1fr; }
    .form-panel { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div style="font-size:2.5rem">💡</div>
  <h1>靈感提醒</h1>
  <p>用 Google 帳號登入<br>電腦、手機資料即時同步</p>
  <button id="google-login-btn" onclick="loginWithGoogle()">
    <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34.2 6.7 29.4 4.5 24 4.5 12.7 4.5 3.5 13.7 3.5 25S12.7 45.5 24 45.5 44.5 36.3 44.5 25c0-1.7-.2-3.3-.9-4.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16 19 12 24 12c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34.2 6.7 29.4 4.5 24 4.5c-7.7 0-14.4 4.4-17.7 10.2z"/><path fill="#4CAF50" d="M24 45.5c5.2 0 10-2 13.6-5.2l-6.3-5.3C29.3 36.8 26.8 37.5 24 37.5c-5.2 0-9.7-3.5-11.3-8.4l-6.5 5C9.5 41.1 16.3 45.5 24 45.5z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.3 5.7l6.3 5.3c-.4.4 6.7-4.9 6.7-14 0-1.7-.2-3.3-.9-4.9z"/></svg>
    使用 Google 登入
  </button>
  <div id="login-error" style="color:#e05252;font-size:0.82rem;display:none"></div>
</div>

<!-- App -->
<div id="app">
  <header>
    <span style="font-size:1.4rem">💡</span>
    <h1>靈感提醒</h1>
    <span id="clock"></span>
    <div id="user-info">
      <button id="notif-btn" onclick="requestNotif()">開啟通知</button>
      <img id="user-avatar" src="" alt="">
      <span id="user-name"></span>
      <button id="logout-btn" onclick="logout()">登出</button>
    </div>
  </header>
  <main>
    <div class="form-panel">
      <div class="panel-title">新增提醒</div>
      <div>
        <label>標題（靈感關鍵字）</label>
        <input type="text" id="inp-title" placeholder="e.g. 美股開盤策略" maxlength="60">
      </div>
      <div>
        <label>詳細內容</label>
        <textarea id="inp-body" placeholder="把你的靈感、策略、注意事項都寫下來…"></textarea>
      </div>
      <div>
        <label>提醒時間</label>
        <input type="datetime-local" id="inp-time">
        <div class="quick-times">
          <button class="qt" onclick="addMinutes(15)">+15 分</button>
          <button class="qt" onclick="addMinutes(30)">+30 分</button>
          <button class="qt" onclick="addMinutes(60)">+1 小時</button>
          <button class="qt" onclick="addMinutes(120)">+2 小時</button>
          <button class="qt" onclick="setToday(18,0)">今天 18:00</button>
          <button class="qt" onclick="setToday(21,30)">今天 21:30</button>
        </div>
      </div>
      <button id="add-btn" onclick="addReminder()">＋ 記錄靈感</button>
    </div>
    <div class="list-panel">
      <div class="list-header">
        <h2>所有提醒</h2>
        <span class="count-badge" id="count-badge">0</span>
        <div class="tabs">
          <button class="tab active" onclick="setFilter('all',this)">全部</button>
          <button class="tab" onclick="setFilter('pending',this)">待提醒</button>
          <button class="tab" onclick="setFilter('fired',this)">已觸發</button>
        </div>
      </div>
      <div id="list"><div class="loading">載入中…</div></div>
    </div>
  </main>
</div>

<div id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, updateDoc, query, where, orderBy }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCPJ5kwytyaGn0pN5JxyC3XKHyjybh4afM",
  authDomain: "reminder-6b75a.firebaseapp.com",
  projectId: "reminder-6b75a",
  storageBucket: "reminder-6b75a.firebasestorage.app",
  messagingSenderId: "150115495510",
  appId: "1:150115495510:web:ecd647b858a97aef73d5f7",
  measurementId: "G-QS88QB87X2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let currentUser = null;
let reminders = [];
let filter = 'all';
let unsubscribe = null;
let notifGranted = Notification.permission === 'granted';

// ── Auth ──────────────────────────────────────────────
window.loginWithGoogle = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch(e) {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-error').textContent = '登入失敗：' + e.message;
  }
};

window.logout = async () => {
  if (unsubscribe) unsubscribe();
  await signOut(auth);
};

onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('user-avatar').src = user.photoURL || '';
    document.getElementById('user-name').textContent = user.displayName || user.email;
    if (notifGranted) document.getElementById('notif-btn').textContent = '通知已開啟 ✓';
    subscribeReminders();
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    reminders = [];
  }
});

// ── Firestore ─────────────────────────────────────────
function subscribeReminders() {
  if (unsubscribe) unsubscribe();
  const q = query(
    collection(db, 'reminders'),
    where('uid', '==', currentUser.uid),
    orderBy('time', 'asc')
  );
  unsubscribe = onSnapshot(q, snap => {
    reminders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });
}

window.addReminder = async () => {
  const title = document.getElementById('inp-title').value.trim();
  const body  = document.getElementById('inp-body').value.trim();
  const tval  = document.getElementById('inp-time').value;
  if (!title) { toast('請輸入標題'); return; }
  if (!tval)  { toast('請選擇提醒時間'); return; }

  const btn = document.getElementById('add-btn');
  btn.disabled = true;
  btn.textContent = '儲存中…';

  try {
    await addDoc(collection(db, 'reminders'), {
      uid: currentUser.uid,
      title, body,
      time: new Date(tval).getTime(),
      fired: false,
      createdAt: Date.now()
    });
    toast('✅ 靈感已記錄！');
    document.getElementById('inp-title').value = '';
    document.getElementById('inp-body').value = '';
    document.getElementById('inp-time').value = '';
  } catch(e) {
    toast('儲存失敗：' + e.message);
  }
  btn.disabled = false;
  btn.textContent = '＋ 記錄靈感';
};

window.confirmReminder = async (id) => {
  await deleteDoc(doc(db, 'reminders', id));
  toast('🗑 提醒已確認並刪除');
};

window.deleteReminder = async (id) => {
  await deleteDoc(doc(db, 'reminders', id));
};

// ── Notification ──────────────────────────────────────
window.requestNotif = async () => {
  const perm = await Notification.requestPermission();
  notifGranted = perm === 'granted';
  toast(notifGranted ? '✅ 通知已開啟' : '通知未允許，將以頁面提醒代替');
  document.getElementById('notif-btn').textContent = notifGranted ? '通知已開啟 ✓' : '開啟通知';
};

// ── Ticker ────────────────────────────────────────────
setInterval(async () => {
  if (!currentUser) return;
  const now = Date.now();
  for (const r of reminders) {
    if (!r.fired && r.time <= now) {
      await updateDoc(doc(db, 'reminders', r.id), { fired: true });
      if (notifGranted) {
        new Notification('💡 ' + r.title, { body: r.body || '靈感提醒時間到了！' });
      }
      toast(`🔔 提醒：${r.title}`);
    }
  }
  render();
}, 1000);

// ── Filter ────────────────────────────────────────────
window.setFilter = (f, el) => {
  filter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
};

// ── Render ────────────────────────────────────────────
function render() {
  const list = document.getElementById('list');
  let visible = reminders.filter(r => {
    if (filter === 'pending') return !r.fired;
    if (filter === 'fired')   return r.fired;
    return true;
  }).sort((a,b) => a.time - b.time);

  document.getElementById('count-badge').textContent = reminders.length;

  if (visible.length === 0) {
    list.innerHTML = `<div class="empty">📭 還沒有提醒<br><span style="font-size:0.82rem">在左側新增你的第一個靈感</span></div>`;
    return;
  }

  list.innerHTML = visible.map(r => {
    const d = new Date(r.time);
    const timeStr = d.toLocaleString('zh-TW', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit', hour12:false });
    const countdown = getCountdown(r.time);
    return `
    <div class="card ${r.fired ? 'firing' : ''}">
      <div class="card-top">
        <div class="card-title">${esc(r.title)}</div>
        <div class="card-time">${timeStr}</div>
      </div>
      ${r.body ? `<div class="card-body">${esc(r.body)}</div>` : ''}
      <div class="card-footer">
        <div class="status-dot ${r.fired ? 'fired' : 'pending'}"></div>
        <span class="status-text">${r.fired ? '🔔 時間到了！' : '等待提醒中'}</span>
        ${!r.fired && countdown ? `<span class="countdown">${countdown}</span>` : ''}
        ${r.fired
          ? `<button class="btn-confirm" onclick="confirmReminder('${r.id}')">✓ 確認並刪除</button>`
          : `<button class="btn-delete" onclick="deleteReminder('${r.id}')">刪除</button>`}
      </div>
    </div>`;
  }).join('');
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
function getCountdown(ts) {
  const diff = ts - Date.now();
  if (diff <= 0) return null;
  const h = Math.floor(diff/3600000);
  const m = Math.floor((diff%3600000)/60000);
  const s = Math.floor((diff%60000)/1000);
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

// ── Clock ─────────────────────────────────────────────
function updateClock() {
  const el = document.getElementById('clock');
  if (el) el.textContent = new Date().toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
}
setInterval(updateClock, 1000);
updateClock();

// ── Quick time ────────────────────────────────────────
function toLocalISO(d) {
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
window.addMinutes = m => { document.getElementById('inp-time').value = toLocalISO(new Date(Date.now() + m*60000)); };
window.setToday = (h,min) => { const d = new Date(); d.setHours(h,min,0,0); document.getElementById('inp-time').value = toLocalISO(d); };

// ── Toast ─────────────────────────────────────────────
let toastTimer;
window.toast = msg => {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
};
</script>
</body>
</html>
